server:
  port: 8082

spring:
  application:
    name: warehouse-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/warehouse}
    username: ${SPRING_DATASOURCE_USERNAME:minimonk}
    password: ${SPRING_DATASOURCE_PASSWORD:minimonk}
  jpa:
    hibernate:
      ddl-auto: validate
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:minimonk}
    password: ${SPRING_RABBITMQ_PASSWORD:minimonk}

management:
  endpoints:
    web:
      exposure:
        include: health,info

minimonk:
  jwt:
    issuer: minimonk
    secret: ${MINIMONK_JWT_SECRET:dev-secret-dev-secret-dev-secret-123456}
