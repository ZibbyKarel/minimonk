services:
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: minimonk
      RABBITMQ_DEFAULT_PASS: minimonk
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  user-db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: users
      POSTGRES_USER: minimonk
      POSTGRES_PASSWORD: minimonk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minimonk -d users"]
      interval: 5s
      timeout: 5s
      retries: 10

  warehouse-db:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: warehouse
      POSTGRES_USER: minimonk
      POSTGRES_PASSWORD: minimonk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minimonk -d warehouse"]
      interval: 5s
      timeout: 5s
      retries: 10

  order-db:
    image: postgres:16-alpine
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: minimonk
      POSTGRES_PASSWORD: minimonk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minimonk -d orders"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.service
      args:
        PROJECT: user-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/users
    depends_on:
      user-db:
        condition: service_healthy
    ports:
      - "8081:8081"

  warehouse-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.service
      args:
        PROJECT: warehouse-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://warehouse-db:5432/warehouse
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      warehouse-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8082:8082"

  order-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.service
      args:
        PROJECT: order-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/orders
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      order-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8083:8083"

  payment-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.service
      args:
        PROJECT: payment-service
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "8084:8084"

  api-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.service
      args:
        PROJECT: api-gateway
    environment:
      USER_SERVICE_URL: http://user-service:8081
      WAREHOUSE_SERVICE_URL: http://warehouse-service:8082
      ORDER_SERVICE_URL: http://order-service:8083
    depends_on:
      - user-service
      - warehouse-service
      - order-service
    ports:
      - "8080:8080"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api-gateway
    ports:
      - "5173:80"
